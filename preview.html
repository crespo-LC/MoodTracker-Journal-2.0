<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoodTracker &amp; Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Caveat:wght@600;700&display=swap"
  rel="stylesheet"
/>
<style>
/* ---------- Tokens de diseño ----------
   paper      #FFF8ED  fondo cálido tipo papel
   paperLine  #F0E4D0  líneas/bordes suaves
   ink        #2B2438  texto principal
   joy        #FFC145  Alegre
   calm       #3EC9B0  Chill
   energy     #FF6F59  Con energía
   moody      #6C63AC  Depre
   rose       #FF4D6D  Awitado
   Tipografía: Fredoka (display) + Nunito (texto) + Caveat (firma)
---------------------------------------- */

:root {
  --paper: #FFF8ED;
  --paper-line: #F0E4D0;
  --ink: #2B2438;
  --muted: #8a7f68;
  --dashed: #C9BCA0;
  --joy: #FFC145;
  --calm: #3EC9B0;
  --energy: #FF6F59;
  --moody: #6C63AC;
  --rose: #FF4D6D;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
}

.app {
  max-width: 640px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---------- Header ---------- */
.topnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 20px 16px;
  gap: 12px;
  flex-wrap: wrap;
}

.brand { display: flex; align-items: center; gap: 12px; }

.app-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 22px;
  margin: 0;
  line-height: 1;
}

.app-title .amp { color: var(--energy); }

.count-label {
  font-size: 12px;
  color: var(--muted);
  margin: 4px 0 0;
}

.tabs {
  display: flex;
  gap: 4px;
  padding: 4px;
  border-radius: 999px;
  background: var(--paper-line);
}

.tab-btn {
  font-family: 'Fredoka', sans-serif;
  font-size: 14px;
  padding: 6px 16px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.tab-btn.active {
  background: var(--ink);
  color: var(--paper);
}

/* ---------- Contenido ---------- */
.view-root { flex: 1; padding: 0 20px 24px; }

.loading {
  text-align: center;
  color: var(--muted);
  padding: 64px 0;
}

/* ---------- Blobs ---------- */
.blob-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s;
}

.blob-wrap.selected { transform: scale(1.1); }

.blob-shape {
  position: absolute;
  inset: 0;
  border-radius: 60% 40% 55% 45% / 55% 45% 60% 40%;
}

.blob-shape.empty {
  background: transparent;
  border: 2px dashed var(--dashed);
  opacity: 0.7;
}

.blob-face { position: relative; }

@keyframes blobbreathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.breathe { animation: blobbreathe 3.2s ease-in-out infinite; }

/* ---------- Vista: Escribir ---------- */
.date-label {
  font-size: 14px;
  color: var(--muted);
  text-transform: capitalize;
  margin: 0 0 4px;
}

.back-today {
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  background: var(--paper-line);
  color: var(--moody);
  border: none;
  border-radius: 999px;
  padding: 6px 14px;
  margin-bottom: 16px;
  cursor: pointer;
}

.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
}

.hero-label {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px;
  margin-top: 12px;
}

.mood-picker {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  padding: 16px 0;
}

.mood-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
}

.mood-option span {
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  color: var(--muted);
}

.mood-option.selected span {
  font-weight: 700;
}

.journal-box {
  margin-top: 16px;
  border-radius: 16px;
  padding: 4px;
  border: 1px solid var(--paper-line);
  background: repeating-linear-gradient(
    180deg,
    #FFFDF9 0px,
    #FFFDF9 34px,
    var(--paper-line) 35px
  );
}

#journal-text {
  width: 100%;
  min-height: 240px;
  background: transparent;
  border: none;
  resize: none;
  outline: none;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  line-height: 35px;
  padding: 0 16px;
  color: var(--ink);
}

#journal-text::placeholder { color: var(--dashed); }

.save-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
}

.saved-flash {
  font-size: 14px;
  color: transparent;
  transition: color 0.2s;
}

.saved-flash.show { color: var(--calm); }

.save-btn {
  font-family: 'Fredoka', sans-serif;
  font-size: 14px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 999px;
  padding: 10px 24px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ---------- Vista: Calendario ---------- */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.cal-arrow {
  width: 32px;
  height: 32px;
  border-radius: 999px;
  border: none;
  background: var(--paper-line);
  color: var(--ink);
  font-family: 'Fredoka', sans-serif;
  font-size: 16px;
  cursor: pointer;
}

.cal-month {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px;
  text-transform: capitalize;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  row-gap: 8px;
  text-align: center;
}

.cal-dow {
  font-size: 12px;
  color: var(--muted);
}

.cal-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
}

.cal-day-num {
  font-size: 11px;
}

.cal-day-num.today { color: var(--energy); font-weight: 800; }

.cal-blob-wrap { position: relative; width: 34px; height: 34px; }

.cal-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  pointer-events: none;
}

.cal-hint {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: 24px;
}

/* ---------- Footer ---------- */
.footer {
  width: 100%;
  text-align: center;
  padding: 24px 0;
}

.signature {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  color: var(--ink);
  display: inline-block;
  transform: rotate(-4deg);
  letter-spacing: 0.5px;
}

</style>
</head>
<body>
  <div class="app">
    <header class="topnav">
      <div class="brand">
        <div id="brand-blob" class="blob-wrap breathe" style="width:40px;height:40px;"></div>
        <div>
          <h1 class="app-title">MoodTracker <span class="amp">&amp;</span> Journal</h1>
          <p id="entry-count" class="count-label">0 días registrados</p>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab-btn active" data-tab="hoy">Escribir</button>
        <button class="tab-btn" data-tab="calendario">Calendario</button>
      </nav>
    </header>

    <main id="view-root" class="view-root"></main>

    <footer class="footer">
      <span class="signature">LC creations</span>
    </footer>
  </div>

  <script>
/* ===========================================================
   MoodTracker & Journal — lógica en JavaScript puro
   Persistencia: localStorage (por navegador/dispositivo)
   =========================================================== */

const STORAGE_KEY = "moodtracker-entries";

const MOODS = [
  { id: "radiante", label: "Alegre", color: "#FFC145", dark: "#8a5a00", mouth: "M -9 3 Q 0 13 9 3" },
  { id: "tranquilo", label: "Chill", color: "#3EC9B0", dark: "#0d4a40", mouth: "M -9 5 Q 0 9 9 5" },
  { id: "energico", label: "Con energía", color: "#FF6F59", dark: "#7a2a1c", mouth: "M -9 2 Q 0 15 9 2" },
  { id: "melancolico", label: "Depre", color: "#6C63AC", dark: "#2b2660", mouth: "M -9 8 Q 0 0 9 8" },
  { id: "enojado", label: "Awitado", color: "#FF4D6D", dark: "#7a0f28", mouth: "M -9 7 Q 0 1 9 7" },
];

function moodById(id) {
  return MOODS.find((m) => m.id === id) || null;
}

const state = {
  entries: {},
  tab: "hoy",
  selectedDate: new Date(),
  calCursor: new Date(),
};

/* ---------- Utilidades de fecha ---------- */
function pad(n) {
  return String(n).padStart(2, "0");
}
function dateKey(d) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}
function sameDay(a, b) {
  return dateKey(a) === dateKey(b);
}
function humanDate(d) {
  return d.toLocaleDateString("es-ES", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric",
  });
}

/* ---------- Persistencia ---------- */
function loadEntries() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state.entries = raw ? JSON.parse(raw) : {};
  } catch (err) {
    console.error("No se pudieron leer las entradas guardadas:", err);
    state.entries = {};
  }
}

function saveEntries() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
    return true;
  } catch (err) {
    console.error("No se pudo guardar la entrada:", err);
    return false;
  }
}

/* ---------- Blob (elemento firma) ---------- */
function blobHTML(mood, size, { breathing = true, selected = false } = {}) {
  const wrapClasses = ["blob-wrap"];
  if (breathing) wrapClasses.push("breathe");
  if (selected) wrapClasses.push("selected");

  if (!mood) {
    return `
      <div class="${wrapClasses.join(" ")}" style="width:${size}px;height:${size}px;">
        <div class="blob-shape empty"></div>
      </div>`;
  }

  return `
    <div class="${wrapClasses.join(" ")}" style="width:${size}px;height:${size}px;">
      <div class="blob-shape" style="background:${mood.color};"></div>
      <svg class="blob-face" width="${size}" height="${size}" viewBox="-20 -20 40 40">
        <circle cx="-6" cy="-3" r="2.1" fill="#2B2438" />
        <circle cx="6" cy="-3" r="2.1" fill="#2B2438" />
        <path d="${mood.mouth}" stroke="#2B2438" stroke-width="2" fill="none" stroke-linecap="round" />
      </svg>
    </div>`;
}

/* ---------- Header ---------- */
function updateHeader() {
  const count = Object.keys(state.entries).length;
  const label = document.getElementById("entry-count");
  label.textContent = `${count} ${count === 1 ? "día registrado" : "días registrados"}`;

  document.getElementById("brand-blob").outerHTML = blobHTML(MOODS[0], 40, {
    breathing: true,
  }).replace('class="blob-wrap', 'id="brand-blob" class="blob-wrap');

  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.tab === state.tab);
  });
}

/* ---------- Vista: Escribir ---------- */
function renderWriteView() {
  const root = document.getElementById("view-root");
  const key = dateKey(state.selectedDate);
  const existing = state.entries[key];
  const isToday = sameDay(state.selectedDate, new Date());
  const currentMood = existing ? existing.mood : null;

  root.innerHTML = `
    ${!isToday ? `<button class="back-today" id="back-today">← Volver a hoy</button>` : ""}
    <p class="date-label">${humanDate(state.selectedDate)}</p>

    <div class="hero">
      ${blobHTML(moodById(currentMood), 110, { breathing: true, selected: true })}
      <p class="hero-label" id="hero-label">${
        currentMood ? moodById(currentMood).label : "¿Cómo te sientes?"
      }</p>
    </div>

    <div class="mood-picker" id="mood-picker">
      ${MOODS.map(
        (m) => `
        <button class="mood-option ${m.id === currentMood ? "selected" : ""}" data-mood="${m.id}">
          ${blobHTML(m, 56, { breathing: false, selected: m.id === currentMood })}
          <span style="${m.id === currentMood ? `color:${m.dark}` : ""}">${m.label}</span>
        </button>`
      ).join("")}
    </div>

    <div class="journal-box">
      <textarea id="journal-text" placeholder="Escribe libremente sobre tu día…">${
        existing ? existing.text : ""
      }</textarea>
    </div>

    <div class="save-row">
      <span class="saved-flash" id="saved-flash">Guardado ✓</span>
      <button class="save-btn" id="save-btn" ${currentMood ? "" : "disabled"}>Guardar entrada</button>
    </div>
  `;

  let selectedMoodId = currentMood;

  if (!isToday) {
    document.getElementById("back-today").addEventListener("click", () => {
      state.selectedDate = new Date();
      renderWriteView();
    });
  }

  root.querySelectorAll(".mood-option").forEach((btn) => {
    btn.addEventListener("click", () => {
      selectedMoodId = btn.dataset.mood;
      const mood = moodById(selectedMoodId);
      document.getElementById("hero-label").textContent = mood.label;
      root.querySelector(".hero").firstElementChild.outerHTML = blobHTML(mood, 110, {
        breathing: true,
        selected: true,
      });
      root.querySelectorAll(".mood-option").forEach((b) => {
        const isSel = b.dataset.mood === selectedMoodId;
        b.classList.toggle("selected", isSel);
        const span = b.querySelector("span");
        span.style.color = isSel ? moodById(b.dataset.mood).dark : "";
      });
      document.getElementById("save-btn").disabled = false;
    });
  });

  document.getElementById("save-btn").addEventListener("click", () => {
    if (!selectedMoodId) return;
    const text = document.getElementById("journal-text").value;
    state.entries[key] = { mood: selectedMoodId, text, updatedAt: Date.now() };
    const ok = saveEntries();
    if (ok) {
      const flash = document.getElementById("saved-flash");
      flash.classList.add("show");
      setTimeout(() => flash.classList.remove("show"), 2000);
      updateHeader();
    }
  });
}

/* ---------- Vista: Calendario ---------- */
function renderCalendarView() {
  const root = document.getElementById("view-root");
  const cursor = state.calCursor;
  const monthLabel = cursor.toLocaleDateString("es-ES", { month: "long", year: "numeric" });

  const first = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const startOffset = (first.getDay() + 6) % 7; // lunes = 0
  const daysInMonth = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(cursor.getFullYear(), cursor.getMonth(), d));

  const today = new Date();
  const dow = ["L", "M", "M", "J", "V", "S", "D"];

  root.innerHTML = `
    <div class="cal-nav">
      <button class="cal-arrow" id="cal-prev">‹</button>
      <p class="cal-month">${monthLabel}</p>
      <button class="cal-arrow" id="cal-next">›</button>
    </div>
    <div class="cal-grid">
      ${dow.map((d) => `<span class="cal-dow">${d}</span>`).join("")}
      ${cells
        .map((d, i) => {
          if (!d) return `<div></div>`;
          const e = state.entries[dateKey(d)];
          const isToday = sameDay(d, today);
          const isSelected = sameDay(d, state.selectedDate);
          return `
            <button class="cal-day" data-date="${dateKey(d)}">
              <div class="cal-blob-wrap">
                ${blobHTML(e ? moodById(e.mood) : null, 34, { breathing: false })}
                ${isSelected ? `<div class="cal-ring"></div>` : ""}
              </div>
              <span class="cal-day-num ${isToday ? "today" : ""}">${d.getDate()}</span>
            </button>`;
        })
        .join("")}
    </div>
    <p class="cal-hint">Toca cualquier día para leer o editar esa entrada.</p>
  `;

  document.getElementById("cal-prev").addEventListener("click", () => {
    state.calCursor = new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1);
    renderCalendarView();
  });
  document.getElementById("cal-next").addEventListener("click", () => {
    state.calCursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
    renderCalendarView();
  });

  root.querySelectorAll(".cal-day").forEach((btn) => {
    btn.addEventListener("click", () => {
      const [y, m, d] = btn.dataset.date.split("-").map(Number);
      state.selectedDate = new Date(y, m - 1, d);
      state.tab = "hoy";
      updateHeader();
      renderWriteView();
    });
  });
}

/* ---------- Navegación entre pestañas ---------- */
function renderCurrentView() {
  if (state.tab === "hoy") {
    renderWriteView();
  } else {
    renderCalendarView();
  }
}

function initTabs() {
  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      state.tab = btn.dataset.tab;
      updateHeader();
      renderCurrentView();
    });
  });
}

/* ---------- Arranque ---------- */
function init() {
  loadEntries();
  initTabs();
  updateHeader();
  renderCurrentView();
}

document.addEventListener("DOMContentLoaded", init);

</script>
</body>
</html>
